<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="512" y1="0" x2="512" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2c2c2c"/>
      <stop offset="1" stop-color="#161616"/>
    </linearGradient>
    <linearGradient id="ring" x1="200" y1="200" x2="820" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff7a6b"/>
      <stop offset="1" stop-color="#ff4f5a"/>
    </linearGradient>
  </defs>

  <!-- dark squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <rect x="6" y="6" width="1012" height="1012" rx="226" fill="none" stroke="#000000" stroke-opacity="0.25" stroke-width="2"/>

  <!-- stopwatch top stem -->
  <rect x="466" y="118" width="92" height="66" rx="24" fill="url(#ring)"/>

  <!-- timer ring: ~300° arc, open at the top -->
  <path d="M 662 252.2 A 300 300 0 1 1 362 252.2"
        fill="none" stroke="url(#ring)" stroke-width="66" stroke-linecap="round"/>

  <!-- the tick / checkmark -->
  <path d="M 372 528 L 466 624 L 658 414"
        fill="none" stroke="#f7f7f7" stroke-width="74"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
